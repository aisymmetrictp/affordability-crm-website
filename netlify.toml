[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/pricing"
  to = "https://crm.aisymmetricsolutions.com/pricing"
  status = 301
  force = true

[[redirects]]
  from = "/demo"
  to = "https://crm.aisymmetricsolutions.com/"
  status = 301
  force = true

[[redirects]]
  from = "/signin"
  to = "https://crm.aisymmetricsolutions.com/"
  status = 301
  force = true

[[redirects]]
  from = "/signup"
  to = "https://crm.aisymmetricsolutions.com/"
  status = 301
  force = true
